<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AMS · Change Password</title>
  <link rel="icon" href="/static/ams-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f4f5f7;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --border:#e5e7eb;
      --shadow: 0 10px 30px rgba(17,24,39,.10);
      --orange:#f47a20;
      --blue:#1976d2;
      --blue2:#2f8cff;
      --danger:#dc2626;
      --success:#16a34a;
    }

    *{box-sizing:border-box}
    html, body{height:100%}
    body{
      margin:0;
      font-family: Poppins, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: var(--bg);
      color: var(--text);
    }

    .topbar{
      position: sticky;
      top: 0;
      z-index: 10;
      background: #ffffff;
      border-bottom: 1px solid rgba(0,0,0,.08);
      box-shadow: 0 2px 10px rgba(17,24,39,.08);
    }
    .topbarInner{
      max-width: 1200px;
      margin: 0 auto;
      padding: 10px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 14px;
    }
    .brand{display:flex; align-items:center; gap: 12px; min-width: 260px}
    .brandLogo{
      width: 46px;
      height: 46px;
      border-radius: 999px;
      overflow:hidden;
      border: 1px solid rgba(0,0,0,.10);
      background: #fbf1f1;
      display:grid;
      place-items:center;
    }
    .brandLogo img{width:100%; height:100%; object-fit:cover; object-position: 50% 58%; transform: scale(1.12); display:block}
    .brandText{display:flex; flex-direction:column; line-height:1.05}
    .brandName{font-weight: 900; letter-spacing: .2px; font-size: 18px}
    .brandName .u{color: var(--orange)}
    .brandName .ms{color:#111}
    .brandSub{font-size: 11px; color: rgba(17,24,39,.70); text-transform: uppercase; letter-spacing: .12em; margin-top: 2px}

    .right{display:flex; align-items:center; gap: 10px}
    .profile{
      display:flex;
      align-items:center;
      gap: 10px;
      padding: 4px 6px 4px 12px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,.08);
      background: #fff;
      box-shadow: 0 6px 18px rgba(17,24,39,.08);
    }
    .profileText{display:flex; flex-direction:column; line-height:1.05; text-align:right}
    .profileName{font-weight: 800; font-size: 12px; color: #111}
    .profileRole{font-size: 11px; color: rgba(17,24,39,.55)}
    .profileAvatar{
      width: 38px;
      height: 38px;
      border-radius: 999px;
      object-fit: cover;
      border: 1px solid rgba(0,0,0,.10);
      background: #f3f4f6;
    }

    .page{max-width: 900px; margin: 0 auto; padding: 22px 20px 44px}
    .card{
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .cardHd{
      padding: 14px 16px;
      border-bottom: 1px solid rgba(0,0,0,.06);
      background: linear-gradient(180deg, rgba(25,118,210,.06), rgba(25,118,210,.02));
    }
    .title{font-weight: 800; font-size: 16px; letter-spacing:.2px}
    .sub{color: var(--muted); font-size: 12px; margin-top: 4px}
    .content{padding: 14px 16px 16px}

    label{display:block; margin: 10px 0 6px; font-weight: 700; font-size: 12px; color: rgba(17,24,39,.72)}
    input[type="password"]{
      width:100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(17,24,39,.14);
      background: #fff;
      color: rgba(17,24,39,.92);
      outline:none;
    }

    button{
      cursor:pointer;
      width: 100%;
      border: 1px solid rgba(0,0,0,.12);
      background: #fff;
      color: rgba(17,24,39,.92);
      padding: 10px 12px;
      border-radius: 12px;
      font-weight: 900;
      font-size: 12px;
      box-shadow: 0 10px 20px rgba(17,24,39,.10);
      margin-top: 12px;
    }
    button:hover{border-color: rgba(244,122,32,.45)}

    .notice{
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,.08);
      background: #fff;
      font-size: 12px;
      font-weight: 700;
    }
    .notice.error{border-color: rgba(220,38,38,.35); color: var(--danger); background: rgba(220,38,38,.06)}
    .notice.success{border-color: rgba(22,163,74,.35); color: var(--success); background: rgba(22,163,74,.06)}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbarInner">
      <div class="brand">
        <div class="brandLogo" aria-hidden="true"><img src="/static/ams-logo.png" alt="AMS" /></div>
        <div class="brandText">
          <div class="brandName"><span class="u">A</span><span class="ms">MS</span></div>
          <div class="brandSub">ATTENDANCE MANAGEMENT SYSTEM</div>
        </div>
      </div>
      <div class="right">
        <div class="profile">
          <div class="profileText">
            <div class="profileName">{{ user_name }}</div>
            <div class="profileRole">{{ user_role|title }}</div>
          </div>
          <img class="profileAvatar" src="{{ user_photo }}" alt="Profile photo" />
        </div>
      </div>
    </div>
  </div>

  <div class="page">
    {% if error %}
      <div class="notice error">{{ error }}</div>
    {% endif %}
    {% if success %}
      <div class="notice success">{{ success }}</div>
    {% endif %}

    <section class="card">
      <div class="cardHd">
        <div class="title">Change Password</div>
        <div class="sub">Update your login password</div>
      </div>
      <div class="content">
        <form method="post" action="/change-password" autocomplete="off">
          <input type="hidden" name="role" value="{{ user_role }}" />
          <input type="hidden" name="profile" value="{{ profile }}" />
          <label>Current Password</label>
          <input type="password" name="current_password" required />

          <label>New Password</label>
          <input type="password" name="new_password" required />

          <label>Confirm New Password</label>
          <input type="password" name="confirm_password" required />

          <button type="submit">Update Password</button>
        </form>
      </div>
    </section>
  </div>

  <script>
    const role = "{{ user_role }}";
    const profile = "{{ profile }}";
    if (role === 'faculty' || role === 'trainer') {
      setInterval(async () => {
        try {
          const res = await fetch(`/auth/ping?role=${encodeURIComponent(role)}&profile=${encodeURIComponent(profile)}`, { cache: 'no-store' });
          const data = await res.json();
          if (!data.ok) {
            window.location.href = `/logout?role=${encodeURIComponent(role)}&profile=${encodeURIComponent(profile)}`;
          }
        } catch (_) {
          // ignore
        }
      }, 8000);
    }
  </script>
</body>
</html>
