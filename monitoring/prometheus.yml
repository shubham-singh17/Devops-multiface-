global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: ams_app
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
